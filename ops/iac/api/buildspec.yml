version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "us-east-1"
    ENVIRONMENT: $ENVIRONMENT
  
  secrets-manager:
    AWS_ACCESS_KEY_ID: "${PROJECT_NAME}-codepipeline/deployment-user-${ENVIRONMENT}:aws_access_key_id"
    AWS_SECRET_ACCESS_KEY: "${PROJECT_NAME}-codepipeline/deployment-user-${ENVIRONMENT}:aws_secret_access_key"

cache:
  paths:
    - 'packages/functions/**/*'
    - 'ops/iac/api/**/*'
    - 'ops/configs/**/*'
    - './packages/functions/daily_news_summary/requirements.txt'
    
phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - "cd /usr/bin"
      - "curl -s -qL -o terraform.zip https://releases.hashicorp.com/terraform/1.3.5/terraform_1.3.5_linux_amd64.zip"
      - "unzip -o terraform.zip"

  build:
    commands:
      - echo $AWS_ACCESS_KEY_ID
      - cd $CODEBUILD_SRC_DIR
      - |
        set -e
        LAMBDA_MOD=./ops/iac/api/lambda
        # Build daily news summary function package directory
        DAILY_NEWS_SRC=./packages/functions/daily_news_summary
        DAILY_NEWS_BUILD=$LAMBDA_MOD/build_daily_news
        rm -rf "$DAILY_NEWS_BUILD" && mkdir -p "$DAILY_NEWS_BUILD"
        rsync -a --exclude '__pycache__' --exclude '*.pyc' --exclude '.venv' --exclude '.env' --exclude 'tests*' "$DAILY_NEWS_SRC/" "$DAILY_NEWS_BUILD/"
        python3 -m pip install -r "$DAILY_NEWS_SRC/requirements.txt" -t "$DAILY_NEWS_BUILD" --platform linux_x86_64 --implementation cp --python-version 3.12 --only-binary=:all: --upgrade --quiet --disable-pip-version-check
      - cd ./ops/iac/api
      - terraform init -reconfigure -backend-config=bucket=world-brief-${ENVIRONMENT}-state
      - terraform apply -input=false -var-file="../../configs/$ENVIRONMENT.tfvars" -auto-approve

  post_build:
    commands:
      - echo "Terraform completed on `date`"

artifacts:
  files:
    - '**/*'