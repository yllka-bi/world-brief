version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "us-east-1"
    ENVIRONMENT: $ENVIRONMENT

  secrets-manager:
    AWS_ACCESS_KEY_ID: "${PROJECT_NAME}-codepipeline/deployment-user-${ENVIRONMENT}:aws_access_key_id"
    AWS_SECRET_ACCESS_KEY: "${PROJECT_NAME}-codepipeline/deployment-user-${ENVIRONMENT}:aws_secret_access_key"

cache:
  paths:
    - 'ops/iac/infra/**/*'
    - 'ops/configs/**/*'

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - cd /usr/bin
      - curl -s -qL -o terraform.zip https://releases.hashicorp.com/terraform/1.3.5/terraform_1.3.5_linux_amd64.zip
      - unzip -o terraform.zip

  build:
    commands:
      - echo $AWS_ACCESS_KEY_ID
      - pwd 
      - cd -
      - cd ./ops/iac/infra
      - terraform init -reconfigure -backend-config="bucket=world-brief-${ENVIRONMENT}-state"
      - terraform apply -input=false -var-file="../../configs/$ENVIRONMENT.tfvars" -auto-approve

  post_build:
    commands:
      - echo "Terraform completed on $(date)"

artifacts:
  files:
    - '**/*'