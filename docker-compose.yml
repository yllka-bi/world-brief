version: '3.8'

services:
  dev:
    build:
      context: .
      dockerfile: ./ops/docker/dockerfile
      args:
        NPM_ACCESS_TOKEN: ${NPM_ACCESS_TOKEN:-}
    container_name: world-brief-dev
    volumes:
      - .:/world-brief/app
      - /world-brief/app/packages/functions/daily_news_summary/venv
    working_dir: /world-brief/app
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-dev}
    stdin_open: true
    tty: true
    networks:
      - world-brief-network

networks:
  world-brief-network:
    driver: bridge

